<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitArc - Phone Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>FitArc</h1>
      <p class="subtitle">Login or sign up with your phone number</p>

      <div id="phone-section">
        <label for="phone-number">Phone Number</label>
        <input
          type="tel"
          id="phone-number"
          placeholder="+91 9876543210"
          autocomplete="tel"
        />
        <button id="send-otp-btn">Send OTP</button>
      </div>

      <div id="otp-section" style="display: none;">
        <label for="otp-code">Enter OTP</label>
        <input
          type="text"
          id="otp-code"
          placeholder="Enter 6-digit code"
          maxlength="6"
          inputmode="numeric"
        />
        <button id="verify-otp-btn">Verify OTP</button>
        <button id="back-btn" type="button">Back</button>
      </div>

      <p id="message"></p>

      <div id="recaptcha-container"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
